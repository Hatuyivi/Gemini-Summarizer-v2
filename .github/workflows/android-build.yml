name: Android APK Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        working-directory: artifacts/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      # pnpm by default isolates packages per workspace. React Native/Metro
      # needs babel-preset-expo and other packages to be resolvable from the
      # project root. shamefully-hoist=true flattens node_modules like npm/yarn.
      - name: Configure pnpm hoisting for React Native Metro
        working-directory: .
        run: echo "shamefully-hoist=true" >> .npmrc

      - name: Accept Android SDK licenses & install NDK 27
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.1.12297006" "cmake;3.22.1"

      - name: Install dependencies (workspace)
        working-directory: .
        run: pnpm install --no-frozen-lockfile

      - name: Generate release keystore
        run: |
          keytool -genkey -v \
            -keystore release.jks \
            -alias key0 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=AI Hub Manager, OU=Dev, O=Dev, L=Dev, S=Dev, C=US" \
            -storepass android \
            -keypass android \
            -noprompt
          ls -la release.jks

      - name: Expo prebuild (Android)
        env:
          EXPO_NO_TELEMETRY: "1"
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.1.12297006
        run: pnpm exec expo prebuild --platform android --no-install --clean

      - name: Configure release signing in build.gradle
        run: |
          cp release.jks android/app/release.jks
          python3 - << 'PYEOF'
          with open('android/app/build.gradle', 'r') as f:
              content = f.read()

          signing_block = """
              signingConfigs {
                  release {
                      storeFile file("release.jks")
                      storePassword "android"
                      keyAlias "key0"
                      keyPassword "android"
                  }
              }
          """

          bt_idx = content.find('buildTypes')
          if bt_idx == -1:
              raise Exception("Could not find 'buildTypes' in build.gradle")
          content = content[:bt_idx] + signing_block + content[bt_idx:]

          first = content.find('release {')
          second = content.find('release {', first + 1)
          if second == -1:
              raise Exception("Could not find second 'release {' (buildTypes.release)")

          insert_at = second + len('release {')
          content = content[:insert_at] + '\n            signingConfig signingConfigs.release' + content[insert_at:]

          with open('android/app/build.gradle', 'w') as f:
              f.write(content)

          print("Signing config injected")
          with open('android/app/build.gradle', 'r') as f:
              for i, line in enumerate(f.readlines(), 1):
                  if 'signingConfig' in line or 'storeFile' in line:
                      print(f"  L{i}: {line.rstrip()}")
          PYEOF

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('artifacts/mobile/android/**/*.gradle*', 'artifacts/mobile/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: artifacts/mobile/android
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.1.12297006
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Locate and upload APK
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" -print -quit)
          if [ -z "$APK_PATH" ]; then
            echo "No APK was produced." >&2
            exit 1
          fi
          echo "Found APK at $APK_PATH"
          echo "apk_path=artifacts/mobile/$APK_PATH" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-hub-manager-android-${{ github.sha }}
          path: ${{ env.apk_path }}
          if-no-files-found: error
          retention-days: 30
